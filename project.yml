name: TheDictator
options:
  bundleIdPrefix: ai.heyama
  deploymentTarget:
    iOS: 18.0
targets:
  TheDictator:
    type: application
    platform: iOS
    sources:
      - path: Sources
        excludes:
          - "TheDictator.entitlements"
    settings:
      base:
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    info:
      path: Sources/Info.plist
      properties:
        UIBackgroundModes: [audio]
        NSMicrophoneUsageDescription: "TheDictator needs microphone access to dictate and process audio locally using MLX."
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
    dependencies:
      - package: mlx-swift-lm
        product: MLXLLM
      - package: mlx-swift-lm
        product: MLXLMCommon
      - package: mlx-swift-lm
        product: MLXVLM
packages:
  mlx-swift-lm:
    url: https://github.com/platx-ai/mlx-swift-lm
    revision: 668347f89c0f7c5c818012fa49b71de10d8cf0e1

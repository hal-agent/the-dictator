name: NeuralFlow
options:
  bundleIdPrefix: ai.heyama
  deploymentTarget:
    iOS: 18.0
targets:
  NeuralFlow:
    type: application
    platform: iOS
    sources:
      - Sources
    info:
      path: Sources/Info.plist
      properties:
        UIBackgroundModes: [audio]
        NSMicrophoneUsageDescription: "NeuralFlow needs microphone access to dictate and process audio locally using MLX."
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
    dependencies:
      - package: mlx-swift-lm
        product: MLXLLM
      - package: mlx-swift-lm
        product: MLXLMCommon
      - package: mlx-swift-lm
        product: MLXHuggingFace
      - package: swift-transformers
        product: Hub
      - package: swift-transformers
        product: Tokenizers
packages:
  mlx-swift-lm:
    url: https://github.com/ml-explore/mlx-swift-lm
    branch: main
  swift-transformers:
    url: https://github.com/huggingface/swift-transformers
    from: 1.1.0
